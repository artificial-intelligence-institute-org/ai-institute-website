<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} — Artificial Intelligence Institute</title>
    <meta name="description" content="{{DESCRIPTION}}">
    <link rel="canonical" href="https://artificialintelligenceinstitute.org/blog/{{SLUG}}.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        :root {
            --font-heading: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-body: 'Source Serif 4', Georgia, 'Times New Roman', serif;
        }
        body {
            font-family: var(--font-body);
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
        }
        .blog-nav {
            padding: 24px 0;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .blog-nav a {
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .blog-nav a:hover {
            color: var(--accent);
        }
        .blog-post {
            max-width: 700px;
            margin: 0 auto;
            padding: 60px 24px 100px;
        }
        .blog-post-header {
            margin-bottom: 48px;
        }
        .blog-post-header h1 {
            font-size: clamp(1.8rem, 3.5vw, 2.6rem);
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
        }
        .blog-post-meta {
            font-family: var(--font-heading);
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .blog-post-meta .separator {
            margin: 0 8px;
        }
        .blog-post-body {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-primary);
        }
        .blog-post-body p {
            margin-bottom: 1.5em;
        }
        .blog-post-body h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 2em 0 0.75em;
            letter-spacing: -0.01em;
        }
        .blog-post-body h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 1.75em 0 0.5em;
        }
        .blog-post-body a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .blog-post-body a:hover {
            color: var(--accent-hover);
        }
        .blog-post-body ul, .blog-post-body ol {
            margin: 0 0 1.5em 1.5em;
        }
        .blog-post-body li {
            margin-bottom: 0.4em;
        }
        .blog-post-body blockquote {
            margin: 2em 0;
            padding: 20px 24px;
            border-left: 3px solid var(--accent);
            background: var(--bg-card);
            border-radius: 0 8px 8px 0;
            font-style: italic;
        }
        .blog-post-body blockquote p {
            margin-bottom: 0;
        }
        .blog-post-body blockquote .quote-attribution {
            display: block;
            margin-top: 8px;
            font-size: 0.9rem;
            font-family: var(--font-heading);
            font-style: normal;
            color: var(--text-muted);
        }
        .blog-post-body blockquote .quote-attribution em {
            font-style: italic;
        }
        .blog-post-body img {
            max-width: 100%;
            border-radius: 8px;
            margin: 2em auto;
            display: block;
        }
        .blog-post-body pre {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px 20px;
            overflow-x: auto;
            margin: 1.5em 0;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .blog-post-body code {
            font-size: 0.85em;
            background: var(--bg-card);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .blog-post-body pre code {
            background: none;
            padding: 0;
        }
        .blog-post-body hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 3em 0;
        }
        @media (max-width: 600px) {
            .blog-post {
                padding: 40px 20px 80px;
            }
            .blog-post-body {
                font-size: 1rem;
            }
        }
    </style>
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://artificialintelligenceinstitute.org/blog/{{SLUG}}.html">
    <meta property="og:site_name" content="Artificial Intelligence Institute">
    <meta property="og:title" content="{{TITLE}}">
    <meta property="og:description" content="{{DESCRIPTION}}">
    <meta property="og:image" content="https://artificialintelligenceinstitute.org/assets/images/og-screenshot-artificial-intelligence-institute.png?v=2">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TITLE}}">
    <meta name="twitter:description" content="{{DESCRIPTION}}">
    <meta name="twitter:image" content="https://artificialintelligenceinstitute.org/assets/images/og-screenshot-artificial-intelligence-institute.png?v=2">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": "{{TITLE}}",
        "description": "{{DESCRIPTION}}",
        "author": {
            "@type": "Organization",
            "name": "{{AUTHOR}}"
        },
        "publisher": {
            "@type": "Organization",
            "name": "Artificial Intelligence Institute"
        },
        "datePublished": "{{DATE}}",
        "mainEntityOfPage": {
            "@type": "WebPage",
            "@id": "https://artificialintelligenceinstitute.org/blog/{{SLUG}}.html"
        }
    }
    </script>
</head>
<body>
    <nav class="blog-nav">
        <a href="../blog/index.html">&larr; Back to Blog</a>
        &nbsp;&middot;&nbsp;
        <a href="../index.html">Home</a>
    </nav>
    <article class="blog-post">
        <header class="blog-post-header">
            <h1>{{TITLE}}</h1>
            <p class="blog-post-meta">
                <span>{{DATE}}</span>
                <span class="separator">&middot;</span>
                <span>{{AUTHOR}}</span>
            </p>
        </header>
        <div class="blog-post-body">
            {{CONTENT}}
        </div>
    </article>
</body>
</html>
