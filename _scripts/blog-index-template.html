<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Artificial Intelligence Institute</title>
    <meta name="description" content="The Artificial Intelligence Institute Blog — insights on AI skills, workforce development, and practical AI for workers.">
    <link rel="canonical" href="https://artificialintelligenceinstitute.org/blog/">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        :root {
            --font-heading: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-body: 'Source Serif 4', Georgia, 'Times New Roman', serif;
        }
        body {
            font-family: var(--font-body);
        }
        h1, h2, h3 {
            font-family: var(--font-heading);
        }
        .blog-nav {
            padding: 24px 0;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .blog-nav a {
            font-family: var(--font-heading);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .blog-nav a:hover {
            color: var(--accent);
        }
        .blog-index {
            max-width: 700px;
            margin: 0 auto;
            padding: 60px 24px 100px;
        }
        .blog-index h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
        }
        .blog-index-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 48px;
        }
        .blog-posts {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        .blog-post-card {
            padding: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: var(--transition);
        }
        .blog-post-card:hover {
            border-color: var(--accent);
            background: var(--bg-card-hover);
        }
        .blog-post-card h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .blog-post-card h2 a {
            color: var(--text-primary);
        }
        .blog-post-card h2 a:hover {
            color: var(--accent);
        }
        .blog-post-card .meta {
            font-family: var(--font-heading);
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        .blog-post-card .excerpt {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .blog-post-card .excerpt a {
            color: var(--accent);
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .no-posts {
            text-align: center;
            padding: 80px 0;
            color: var(--text-muted);
        }
        @media (max-width: 600px) {
            .blog-index {
                padding: 40px 20px 80px;
            }
        }
    </style>
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://artificialintelligenceinstitute.org/blog/">
    <meta property="og:site_name" content="Artificial Intelligence Institute">
    <meta property="og:title" content="Blog — Artificial Intelligence Institute">
    <meta property="og:description" content="Insights on AI skills, workforce development, and practical AI for workers.">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Blog — Artificial Intelligence Institute">
    <meta name="twitter:description" content="Insights on AI skills, workforce development, and practical AI for workers.">
</head>
<body>
    <nav class="blog-nav">
        <a href="../index.html">&larr; Home</a>
    </nav>
    <section class="blog-index">
        <h1>Blog</h1>
        <p class="blog-index-subtitle">Insights on AI skills, workforce development, and practical AI for workers.</p>
        {{POSTS}}
    </section>
</body>
</html>
