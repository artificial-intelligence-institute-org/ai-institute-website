<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Artificial Intelligence Institute</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -0.03em;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .error-desc {
            color: var(--text-secondary);
            max-width: 440px;
            margin: 0 auto 32px;
            font-size: 1.05rem;
        }
        .error-btn {
            display: inline-flex;
            padding: 14px 36px;
            background: var(--accent);
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1rem;
            border-radius: 10px;
            text-decoration: none;
            transition: var(--transition);
        }
        .error-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }
    </style>
</head>
<body>
    <section class="error-section">
        <div>
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
            <a href="https://artificialintelligenceinstitute.org/" class="error-btn">Go Home</a>
        </div>
    </section>
</body>
</html>
